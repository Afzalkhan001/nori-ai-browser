<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --porcelain-50: #faf8f4; --porcelain-100: #f6f3ec;
        --ink-900: #21211d; --ink-700: #45443e; --ink-500: #6f6d64; --ink-400: #918f85; --ink-300: #b3b1a6;
        --moss-700: #34503e; --moss-600: #40604b;
        --hair: rgba(33, 33, 29, 0.1);
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
        background: var(--porcelain-100); color: var(--ink-900);
        height: 100vh; display: flex; flex-direction: column; font-size: 13px;
      }
      .serif { font-family: Georgia, 'Times New Roman', serif; font-style: italic; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; border-bottom: 1px solid var(--hair);
      }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; }
      .brand img { width: 22px; height: 22px; border-radius: 6px; }
      .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-400); font-size: 16px; padding: 4px; }
      .icon-btn:hover { color: var(--ink-900); }

      #log { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 18px; }
      .msg .who { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 5px; }
      .msg.nori .who { color: var(--moss-600); }
      .msg .body { line-height: 1.6; white-space: pre-wrap; color: var(--ink-900); }
      .msg.you .body { color: var(--ink-500); }
      .empty { margin-top: 8px; color: var(--ink-500); line-height: 1.6; }
      .empty h2 { font-family: Georgia, serif; font-style: italic; font-size: 24px; font-weight: 500; color: var(--ink-900); margin-bottom: 8px; }
      .sug { border-top: 1px solid var(--hair); padding: 11px 0; cursor: pointer; color: var(--ink-700); display: flex; justify-content: space-between; }
      .sug:last-child { border-bottom: 1px solid var(--hair); }
      .sug:hover { color: var(--ink-900); }
      .sug span:last-child { color: var(--moss-600); }

      footer { border-top: 1px solid var(--hair); padding: 12px 14px; }
      .composer { display: flex; gap: 8px; align-items: flex-end; }
      textarea {
        flex: 1; resize: none; border: none; background: transparent; outline: none;
        font: inherit; color: var(--ink-900); max-height: 120px; line-height: 1.5;
      }
      textarea::placeholder { color: var(--ink-300); font-style: italic; }
      .send { background: var(--moss-700); color: var(--porcelain-50); border: none; border-radius: 50%;
        width: 30px; height: 30px; cursor: pointer; font-size: 14px; flex-shrink: 0; }
      .send:disabled { background: rgba(33,33,29,0.06); color: var(--ink-300); cursor: default; }

      /* Settings */
      #settings { padding: 16px; overflow-y: auto; display: none; }
      #settings.show { display: block; }
      #settings h3 { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--moss-600); margin-bottom: 8px; }
      #settings p { color: var(--ink-500); line-height: 1.55; margin-bottom: 14px; }
      label { display: block; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-400); margin: 12px 0 5px; }
      select, input {
        width: 100%; padding: 9px 11px; border: 1px solid var(--hair); border-radius: 9px;
        background: var(--porcelain-50); font: inherit; color: var(--ink-900); outline: none;
      }
      input:focus, select:focus { border-color: rgba(64,96,75,0.5); }
      .note { font-size: 11px; color: var(--ink-400); margin-top: 6px; line-height: 1.5; }
      .save { margin-top: 16px; width: 100%; padding: 10px; background: var(--moss-700); color: var(--porcelain-50);
        border: none; border-radius: 10px; cursor: pointer; font: inherit; }
      .save:hover { background: var(--moss-600); }
      a { color: var(--moss-600); }
    </style>
  </head>
  <body>
    <header>
      <div class="brand"><img src="icon.png" alt="" /> Nori</div>
      <button class="icon-btn" id="gear" title="Settings">⚙</button>
    </header>

    <div id="settings">
      <h3>Connect an AI provider</h3>
      <p>Pick a free provider and paste a key. Stored on this device only, in your browser.</p>
      <label>Provider</label>
      <select id="provider"></select>
      <div class="note" id="provNote"></div>
      <label>API key</label>
      <input id="apiKey" type="password" placeholder="Paste your key" />
      <div class="note" id="keyLink"></div>
      <label>Model</label>
      <input id="model" />
      <button class="save" id="save">Save</button>
    </div>

    <div id="log"></div>

    <footer>
      <div class="composer">
        <textarea id="q" rows="1" placeholder="Ask about this page…"></textarea>
        <button class="send" id="send" disabled>↑</button>
      </div>
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
