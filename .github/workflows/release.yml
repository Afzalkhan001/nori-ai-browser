name: Release

# Build signed-less installers for Windows + macOS and publish them to a GitHub
# Release whenever a version tag (v1.2.3) is pushed. electron-updater reads these
# Releases to auto-update installed copies.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      # Don't let one platform's failure cancel the other — the Windows installer
      # should still publish even if the macOS build has a hiccup.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: npm run icon

      - name: Build and publish ${{ matrix.platform }}
        run: npm run build && npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds: skip macOS signing-identity auto-discovery, which can
          # hard-fail the mac job on CI (no certificate present).
          CSC_IDENTITY_AUTO_DISCOVERY: false
